<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbi Italiani — Presente</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --gold: #c9a84c;
    --gold-light: #e8c96e;
    --green: #4caf82;
    --red: #e05c5c;
    --text: #e8e4dc;
    --muted: #7a7880;
    --accent: #6b7ff0;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 2rem 1rem 4rem;
}

/* Background texture */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 60%),
radial-gradient(ellipse 60% 40% at 80% 90%, rgba(107,127,240,0.05) 0%, transparent 60%);
pointer-events: none;
z-index: 0;
}

.container {
width: 100%;
max-width: 860px;
position: relative;
z-index: 1;
}

/* Header */
header {
text-align: center;
margin-bottom: 2.5rem;
padding-bottom: 2rem;
border-bottom: 1px solid var(–border);
}

.flag-bar {
display: flex;
justify-content: center;
gap: 0;
margin-bottom: 1.5rem;
}

.flag-bar span {
display: block;
height: 4px;
width: 80px;
border-radius: 2px;
}
.flag-bar .f1 { background: #009246; }
.flag-bar .f2 { background: #fff; }
.flag-bar .f3 { background: #ce2b37; }

h1 {
font-family: ‘Playfair Display’, serif;
font-size: clamp(2.2rem, 5vw, 3.5rem);
font-weight: 900;
color: var(–gold);
letter-spacing: -0.02em;
line-height: 1.1;
}

.subtitle {
font-family: ‘DM Mono’, monospace;
font-size: 0.7rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
margin-top: 0.5rem;
}

/* Verb cards */
.verb-grid {
display: flex;
flex-wrap: wrap;
gap: 0.5rem;
margin-bottom: 1.5rem;
}

.verb-chip {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 6px;
padding: 0.5rem 1rem;
cursor: pointer;
transition: all 0.18s ease;
font-size: 0.9rem;
font-weight: 500;
color: var(–text);
}

.verb-chip:hover {
border-color: var(–gold);
color: var(–gold);
transform: translateY(-1px);
}

.verb-chip.active {
background: var(–gold);
color: var(–bg);
border-color: var(–gold);
font-weight: 700;
}

.verb-chip .meaning {
font-family: ‘DM Mono’, monospace;
font-size: 0.62rem;
display: block;
opacity: 0.65;
letter-spacing: 0.05em;
text-transform: uppercase;
margin-top: 1px;
}

/* Filter tabs */
.filter-row {
display: flex;
flex-wrap: wrap;
gap: 0.4rem;
margin-bottom: 2rem;
}

.filter-btn {
background: transparent;
border: 1px solid var(–border);
border-radius: 4px;
padding: 0.35rem 0.75rem;
cursor: pointer;
font-size: 0.78rem;
font-family: ‘DM Mono’, monospace;
color: var(–muted);
transition: all 0.15s ease;
letter-spacing: 0.05em;
}

.filter-btn:hover { border-color: var(–muted); color: var(–text); }
.filter-btn.active { border-color: var(–accent); color: var(–accent); background: rgba(107,127,240,0.08); }

/* Conjugation table — shown on chip tap */
.conj-panel {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 1.5rem;
margin-bottom: 2rem;
display: none;
animation: fadeUp 0.25s ease;
}

.conj-panel.visible { display: block; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(8px); }
to   { opacity: 1; transform: translateY(0); }
}

.conj-header {
display: flex;
align-items: baseline;
gap: 1rem;
margin-bottom: 1.2rem;
padding-bottom: 1rem;
border-bottom: 1px solid var(–border);
}

.conj-verb {
font-family: ‘Playfair Display’, serif;
font-size: 1.8rem;
font-weight: 700;
color: var(–gold);
}

.conj-meaning {
font-size: 0.85rem;
color: var(–muted);
}

.conj-tip {
font-family: ‘DM Mono’, monospace;
font-size: 0.72rem;
color: var(–accent);
background: rgba(107,127,240,0.08);
border: 1px solid rgba(107,127,240,0.2);
border-radius: 4px;
padding: 0.2rem 0.5rem;
margin-left: auto;
}

.conj-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 0.4rem;
}

.conj-row {
display: flex;
align-items: center;
gap: 0.75rem;
padding: 0.5rem 0.75rem;
border-radius: 6px;
background: var(–surface2);
}

.pronoun {
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
color: var(–muted);
min-width: 3rem;
text-transform: lowercase;
}

.form {
font-weight: 500;
font-size: 0.95rem;
}

.phonetic {
font-family: ‘DM Mono’, monospace;
font-size: 0.65rem;
color: var(–muted);
margin-left: auto;
}

/* ── Flashcard section ── */
.fc-controls {
display: flex;
flex-wrap: wrap;
gap: 0.4rem;
margin-bottom: 1.2rem;
}

.fc-filter-btn {
background: transparent;
border: 1px solid var(–border);
border-radius: 4px;
padding: 0.35rem 0.75rem;
cursor: pointer;
font-size: 0.78rem;
font-family: ‘DM Mono’, monospace;
color: var(–muted);
transition: all 0.15s ease;
letter-spacing: 0.05em;
}
.fc-filter-btn:hover { border-color: var(–muted); color: var(–text); }
.fc-filter-btn.active { border-color: var(–green); color: var(–green); background: rgba(76,175,130,0.08); }

.fc-progress-wrap {
background: var(–surface2);
border-radius: 4px;
height: 4px;
margin-bottom: 1.5rem;
overflow: hidden;
}
.fc-progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–green), var(–accent));
border-radius: 4px;
transition: width 0.4s ease;
width: 0%;
}

/* Flip card — single fixed-height container, no layout shift */
.fc-scene {
width: 100%;
height: 220px;
perspective: 1000px;
margin-bottom: 1.2rem;
cursor: pointer;
flex-shrink: 0;
}

.fc-card {
width: 100%;
height: 220px;
position: relative;
transform-style: preserve-3d;
transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
}

.fc-card.flipped { transform: rotateY(180deg); }

.fc-face {
position: absolute;
top: 0; left: 0;
width: 100%;
height: 100%;
backface-visibility: hidden;
-webkit-backface-visibility: hidden;
border-radius: 12px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 2rem;
text-align: center;
overflow: hidden;
}

.fc-front {
background: var(–surface);
border: 1px solid var(–border);
}

.fc-front::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, var(–green), var(–accent));
opacity: 0.5;
}

.fc-back {
background: var(–surface2);
border: 1px solid var(–green);
transform: rotateY(180deg);
}

.fc-back::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, var(–green), var(–gold));
}

.fc-label {
font-family: ‘DM Mono’, monospace;
font-size: 0.65rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 1rem;
}

.fc-pronoun {
font-family: ‘DM Mono’, monospace;
font-size: 1rem;
color: var(–accent);
margin-bottom: 0.4rem;
}

.fc-verb {
font-family: ‘Playfair Display’, serif;
font-size: 2rem;
font-weight: 700;
color: var(–gold);
margin-bottom: 0.3rem;
}

.fc-meaning {
font-size: 0.82rem;
color: var(–muted);
}

.fc-tap-hint {
font-family: ‘DM Mono’, monospace;
font-size: 0.65rem;
color: var(–muted);
margin-top: 1.2rem;
letter-spacing: 0.1em;
}

.fc-answer {
font-family: ‘Playfair Display’, serif;
font-size: 2.8rem;
font-weight: 900;
color: var(–green);
margin-bottom: 0.5rem;
}

.fc-phonetic {
font-family: ‘DM Mono’, monospace;
font-size: 0.78rem;
color: var(–accent);
margin-bottom: 0.8rem;
}

.fc-tip {
font-size: 0.78rem;
color: var(–muted);
font-style: italic;
max-width: 320px;
}

/* Nav buttons */
.fc-nav {
display: flex;
gap: 0.75rem;
justify-content: center;
align-items: center;
margin-bottom: 0.75rem;
}

.fc-nav-btn {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
padding: 0.65rem 1.4rem;
font-size: 0.85rem;
font-family: ‘DM Sans’, sans-serif;
font-weight: 500;
color: var(–text);
cursor: pointer;
transition: all 0.15s ease;
}
.fc-nav-btn:hover { border-color: var(–gold); color: var(–gold); }
.fc-nav-btn:disabled { opacity: 0.3; cursor: default; }

.fc-counter {
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
color: var(–muted);
min-width: 4rem;
text-align: center;
}

.fc-shuffle-btn {
display: block;
margin: 0 auto 0.5rem;
background: transparent;
border: 1px solid var(–border);
border-radius: 4px;
padding: 0.3rem 0.8rem;
font-size: 0.72rem;
font-family: ‘DM Mono’, monospace;
color: var(–muted);
cursor: pointer;
letter-spacing: 0.05em;
transition: all 0.15s ease;
}
.fc-shuffle-btn:hover { border-color: var(–gold); color: var(–gold); }

/* Practice section */
.section-label {
font-family: ‘DM Mono’, monospace;
font-size: 0.65rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
display: flex;
align-items: center;
gap: 0.5rem;
margin-bottom: 1.2rem;
}

.section-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}

.score-badge {
font-family: ‘DM Mono’, monospace;
font-size: 0.8rem;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 20px;
padding: 0.25rem 0.75rem;
color: var(–gold);
margin-left: auto;
}

/* Quiz card */
.quiz-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 2rem;
text-align: center;
animation: fadeUp 0.3s ease;
position: relative;
overflow: hidden;
}

.quiz-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, var(–gold), var(–accent));
opacity: 0.6;
}

.quiz-verb-hint {
font-family: ‘DM Mono’, monospace;
font-size: 0.7rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 0.5rem;
}

.quiz-verb-hint .verb-name { color: var(–gold); }

.quiz-sentence {
font-family: ‘Playfair Display’, serif;
font-size: clamp(1.4rem, 3vw, 2rem);
line-height: 1.5;
margin-bottom: 0.5rem;
}

.quiz-blank {
display: inline-block;
border-bottom: 2px solid var(–gold);
min-width: 5rem;
text-align: center;
font-style: italic;
color: var(–gold);
}

.quiz-tip {
font-size: 0.78rem;
color: var(–accent);
margin-bottom: 1.8rem;
}

.options-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 0.75rem;
max-width: 480px;
margin: 0 auto;
}

.option-btn {
background: var(–surface2);
border: 1.5px solid var(–border);
border-radius: 8px;
padding: 0.85rem 1rem;
font-size: 1rem;
font-family: ‘DM Sans’, sans-serif;
font-weight: 500;
color: var(–text);
cursor: pointer;
transition: all 0.18s ease;
letter-spacing: 0.02em;
}

.option-btn:hover:not(:disabled) {
border-color: var(–gold);
color: var(–gold);
transform: translateY(-2px);
box-shadow: 0 4px 16px rgba(201,168,76,0.1);
}

.option-btn.correct {
background: rgba(76,175,130,0.15);
border-color: var(–green);
color: var(–green);
}

.option-btn.wrong {
background: rgba(224,92,92,0.12);
border-color: var(–red);
color: var(–red);
}

.option-btn:disabled { cursor: default; }

/* Feedback */
.feedback {
margin-top: 1.5rem;
padding: 1rem 1.5rem;
border-radius: 8px;
font-size: 0.88rem;
line-height: 1.6;
display: none;
text-align: left;
animation: fadeUp 0.2s ease;
}

.feedback.correct-fb {
display: block;
background: rgba(76,175,130,0.1);
border: 1px solid rgba(76,175,130,0.3);
color: var(–green);
}

.feedback.wrong-fb {
display: block;
background: rgba(224,92,92,0.1);
border: 1px solid rgba(224,92,92,0.3);
color: var(–red);
}

.feedback strong { font-weight: 700; }
.feedback .rule { color: var(–accent); font-style: italic; margin-top: 0.3rem; display: block; font-size: 0.8rem; }

.next-btn {
margin-top: 1.2rem;
background: var(–gold);
color: var(–bg);
border: none;
border-radius: 8px;
padding: 0.75rem 2rem;
font-size: 0.9rem;
font-weight: 700;
font-family: ‘DM Sans’, sans-serif;
cursor: pointer;
transition: all 0.15s ease;
letter-spacing: 0.04em;
display: none;
}

.next-btn:hover { background: var(–gold-light); transform: translateY(-1px); }
.next-btn.visible { display: inline-block; animation: fadeUp 0.2s ease; }

/* Progress bar */
.progress-wrap {
background: var(–surface2);
border-radius: 4px;
height: 4px;
margin-bottom: 2rem;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–gold), var(–accent));
border-radius: 4px;
transition: width 0.4s ease;
width: 0%;
}

/* Streak */
.streak {
display: flex;
align-items: center;
justify-content: center;
gap: 0.5rem;
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
color: var(–muted);
margin-top: 1rem;
}

.streak-fire { font-size: 1rem; }

/* Empty state */
.empty-state {
text-align: center;
padding: 3rem 1rem;
color: var(–muted);
font-size: 0.9rem;
}

@media (max-width: 500px) {
.conj-grid { grid-template-columns: 1fr; }
.options-grid { grid-template-columns: 1fr; }
}
</style>

</head>
<body>
<div class="container">

  <header>
    <div class="flag-bar">
      <span class="f1"></span><span class="f2"></span><span class="f3"></span>
    </div>
    <h1>Verbi al Presente</h1>
    <div class="subtitle">Present Tense Conjugations — Italian</div>
  </header>

  <!-- ── FLASHCARD MODULE ── -->

  <div class="section-label">🃏 Flashcards — conjugations in isolation</div>

  <div class="fc-controls" id="fcControls"></div>

  <div class="fc-progress-wrap"><div class="fc-progress-fill" id="fcProgressFill"></div></div>

  <div class="fc-scene" id="fcScene" onclick="flipCard()">
    <div class="fc-card" id="fcCard">
      <div class="fc-face fc-front" id="fcFront"></div>
      <div class="fc-face fc-back"  id="fcBack"></div>
    </div>
  </div>

  <div class="fc-nav">
    <button class="fc-nav-btn" id="fcPrev" onclick="fcMove(-1)">← Indietro</button>
    <span class="fc-counter" id="fcCounter">1 / 1</span>
    <button class="fc-nav-btn" id="fcNext" onclick="fcMove(1)">Avanti →</button>
  </div>
  <button class="fc-shuffle-btn" onclick="fcShuffle()">⇄ Shuffle cards</button>

  <!-- Verb chips -->

  <div class="section-label">📖 Reference — tap a verb to see full conjugation</div>
  <div class="verb-grid" id="verbGrid"></div>

  <!-- Conjugation panel -->

  <div class="conj-panel" id="conjPanel"></div>

  <!-- Filter row -->

  <div class="filter-row" id="filterRow"></div>

  <!-- Score + label -->

  <div class="section-label">
    ✏️ Choose the correct form
    <div class="score-badge" id="scoreBadge">0 / 0</div>
  </div>

  <!-- Progress -->

  <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>

  <!-- Quiz card -->

  <div id="quizArea"></div>

</div>

<script>
const VERBS = [
  {
    id: 'essere', label: 'essere', meaning: 'to be', type: 'irregular',
    tip: 'essere is irregular — must memorise!',
    conjugations: [
      { pronoun: 'io',       form: 'sono',   phonetic: 'SO-no' },
      { pronoun: 'tu',       form: 'sei',    phonetic: 'say (closed e, no glide)' },
      { pronoun: 'lui/lei',  form: 'è',      phonetic: 'eh (open e)' },
      { pronoun: 'noi',      form: 'siamo',  phonetic: 'SYAH-mo' },
      { pronoun: 'voi',      form: 'siete',  phonetic: 'SYEH-teh (open e)' },
      { pronoun: 'loro',     form: 'sono',   phonetic: 'SO-no' },
    ],
    sentences: [
      { it: 'Io ___ italiano.',  en: 'I am Italian.', pronoun: 'io',      answer: 'sono', distractors: ['sei','è','siamo'] },
      { it: 'Tu ___ stanco?',    en: 'Are you tired?', pronoun: 'tu',     answer: 'sei',  distractors: ['sono','è','siete'] },
      { it: 'Lei ___ dottoressa.', en: 'She is a doctor.', pronoun: 'lui/lei', answer: 'è', distractors: ['sono','sei','siamo'] },
      { it: 'Noi ___ amici.',    en: 'We are friends.', pronoun: 'noi',   answer: 'siamo',distractors: ['sono','sei','siete'] },
      { it: 'Voi ___ bravi!',   en: 'You all are great!', pronoun: 'voi', answer: 'siete',distractors: ['sono','siamo','è'] },
    ]
  },
  {
    id: 'avere', label: 'avere', meaning: 'to have', type: 'irregular',
    tip: 'avere: silent h in ho, hai, ha, hanno',
    conjugations: [
      { pronoun: 'io',       form: 'ho',     phonetic: 'o (silent h)' },
      { pronoun: 'tu',       form: 'hai',    phonetic: 'ai (silent h)' },
      { pronoun: 'lui/lei',  form: 'ha',     phonetic: 'a (silent h)' },
      { pronoun: 'noi',      form: 'abbiamo',phonetic: 'ab-BYAH-mo' },
      { pronoun: 'voi',      form: 'avete',  phonetic: 'a-VEH-teh (open e)' },
      { pronoun: 'loro',     form: 'hanno',  phonetic: 'AN-no (silent h)' },
    ],
    sentences: [
      { it: 'Io ___ fame.',     en: "I am hungry (lit: I have hunger).", pronoun: 'io',      answer: 'ho',     distractors: ['hai','ha','abbiamo'] },
      { it: 'Tu ___ un cane?',  en: 'Do you have a dog?',               pronoun: 'tu',      answer: 'hai',    distractors: ['ho','ha','avete'] },
      { it: 'Lei ___ ragione.', en: 'She is right.',                    pronoun: 'lui/lei', answer: 'ha',     distractors: ['ho','hai','hanno'] },
      { it: 'Noi ___ freddo.',  en: 'We are cold.',                     pronoun: 'noi',     answer: 'abbiamo',distractors: ['avete','hanno','ha'] },
      { it: 'Loro ___ fretta.', en: 'They are in a hurry.',             pronoun: 'loro',    answer: 'hanno',  distractors: ['ho','ha','abbiamo'] },
    ]
  },
  {
    id: 'parlare', label: 'parlare', meaning: 'to speak', type: '-ARE',
    tip: '-ARE verbs: drop -are, add -o / -i / -a / -iamo / -ate / -ano',
    conjugations: [
      { pronoun: 'io',       form: 'parlo',   phonetic: 'PAR-lo' },
      { pronoun: 'tu',       form: 'parli',   phonetic: 'PAR-lee' },
      { pronoun: 'lui/lei',  form: 'parla',   phonetic: 'PAR-la' },
      { pronoun: 'noi',      form: 'parliamo',phonetic: 'par-LYAH-mo' },
      { pronoun: 'voi',      form: 'parlate', phonetic: 'par-LAH-teh (open e)' },
      { pronoun: 'loro',     form: 'parlano', phonetic: 'PAR-la-no' },
    ],
    sentences: [
      { it: 'Io ___ italiano.',      en: 'I speak Italian.',        pronoun: 'io',      answer: 'parlo',   distractors: ['parli','parla','parlano'] },
      { it: 'Tu ___ troppo!',        en: 'You talk too much!',      pronoun: 'tu',      answer: 'parli',   distractors: ['parlo','parla','parlate'] },
      { it: 'Noi ___ insieme.',      en: 'We speak together.',      pronoun: 'noi',     answer: 'parliamo',distractors: ['parlate','parlano','parla'] },
      { it: 'Loro ___ in fretta.',   en: 'They speak fast.',        pronoun: 'loro',    answer: 'parlano', distractors: ['parla','parlate','parliamo'] },
    ]
  },
  {
    id: 'mangiare', label: 'mangiare', meaning: 'to eat', type: '-ARE',
    tip: '-iare verbs: tu/noi drop the extra i (mangi, mangiamo)',
    conjugations: [
      { pronoun: 'io',       form: 'mangio',   phonetic: 'MAN-jo' },
      { pronoun: 'tu',       form: 'mangi',    phonetic: 'MAN-jee' },
      { pronoun: 'lui/lei',  form: 'mangia',   phonetic: 'MAN-ja' },
      { pronoun: 'noi',      form: 'mangiamo', phonetic: 'man-JAH-mo' },
      { pronoun: 'voi',      form: 'mangiate', phonetic: 'man-JAH-teh (open e)' },
      { pronoun: 'loro',     form: 'mangiano', phonetic: 'MAN-ja-no' },
    ],
    sentences: [
      { it: 'Io ___ la pizza.',     en: 'I eat pizza.',            pronoun: 'io',      answer: 'mangio',   distractors: ['mangi','mangia','mangiano'] },
      { it: 'Tu ___ troppo!',       en: 'You eat too much!',       pronoun: 'tu',      answer: 'mangi',    distractors: ['mangio','mangia','mangiate'] },
      { it: 'Loro ___ alle otto.',  en: 'They eat at eight.',      pronoun: 'loro',    answer: 'mangiano', distractors: ['mangia','mangiamo','mangiate'] },

  },

      { pronoun: 'io',       form: 'prendo',   phonetic: 'PREN-do' },

      { pronoun: 'lui/lei',  form: 'prende',   phonetic: 'PREN-deh (open e)' },
      { pronoun: 'noi',      form: 'prendiamo',phonetic: 'pren-DYAH-mo' },
      { pronoun: 'voi',      form: 'prendete', phonetic: 'pren-DEH-teh (open e)' },
      { pronoun: 'loro',     form: 'prendono', phonetic: 'PREN-do-no' },
    ],
    sentences: [
      { it: 'Io ___ il caffè.',       en: 'I have a coffee.',        pronoun: 'io',      answer: 'prendo',   distractors: ['prendi','prende','prendono'] },
      { it: 'Tu ___ il treno?',       en: 'Are you taking the train?',pronoun: 'tu',     answer: 'prendi',   distractors: ['prendo','prende','prendete'] },
      { it: 'Lei ___ un taxi.',       en: 'She takes a taxi.',       pronoun: 'lui/lei', answer: 'prende',   distractors: ['prendo','prendi','prendiamo'] },
      { it: 'Voi ___ il volo?',       en: 'Are you taking the flight?',pronoun:'voi',    answer: 'prendete', distractors: ['prendiamo','prendono','prende'] },
    ]
  },
  {
    id: 'finire', label: 'finire', meaning: 'to finish', type: '-IRE',
    tip: '-IRE (isc) verbs: insert -isc- for io/tu/lui/loro',
    conjugations: [
      { pronoun: 'io',       form: 'finisco',  phonetic: 'fee-NIS-ko' },
      { pronoun: 'tu',       form: 'finisci',  phonetic: 'fee-NIS-kee' },
      { pronoun: 'lui/lei',  form: 'finisce',  phonetic: 'fee-NIS-keh (open e)' },
      { pronoun: 'noi',      form: 'finiamo',  phonetic: 'fee-NYAH-mo' },
      { pronoun: 'voi',      form: 'finite',   phonetic: 'fee-NEE-teh (open e)' },
      { pronoun: 'loro',     form: 'finiscono',phonetic: 'fee-NIS-ko-no' },
    ],
    sentences: [
      { it: 'Io ___ i compiti.',       en: 'I finish the homework.',   pronoun: 'io',      answer: 'finisco',  distractors: ['finisci','finisce','finiamo'] },
      { it: 'Lui ___ alle cinque.',    en: 'He finishes at five.',     pronoun: 'lui/lei', answer: 'finisce',  distractors: ['finisco','finisci','finiscono'] },
      { it: 'Noi ___ presto.',         en: 'We finish early.',         pronoun: 'noi',     answer: 'finiamo',  distractors: ['finite','finiscono','finisce'] },
      { it: 'Loro ___ il corso.',      en: 'They finish the course.',  pronoun: 'loro',    answer: 'finiscono',distractors: ['finisce','finiamo','finite'] },
    ]
  },
  {
    id: 'andare', label: 'andare', meaning: 'to go', type: 'irregular',
    tip: 'andare is irregular — vado/vai/va but andiamo/andate',
    conjugations: [
      { pronoun: 'io',       form: 'vado',    phonetic: 'VAH-do' },
      { pronoun: 'tu',       form: 'vai',     phonetic: 'vai (rhymes with eye)' },
      { pronoun: 'lui/lei',  form: 'va',      phonetic: 'va' },
      { pronoun: 'noi',      form: 'andiamo', phonetic: 'an-DYAH-mo' },
      { pronoun: 'voi',      form: 'andate',  phonetic: 'an-DAH-teh (open e)' },
      { pronoun: 'loro',     form: 'vanno',   phonetic: 'VAN-no' },
    ],
    sentences: [
      { it: 'Io ___ al mercato.',   en: 'I go to the market.',      pronoun: 'io',      answer: 'vado',   distractors: ['vai','va','vanno'] },
      { it: 'Tu ___ a scuola?',     en: 'Do you go to school?',     pronoun: 'tu',      answer: 'vai',    distractors: ['vado','va','andate'] },
      { it: 'Noi ___ insieme.',     en: 'We go together.',          pronoun: 'noi',     answer: 'andiamo',distractors: ['andate','vanno','va'] },
      { it: 'Loro ___ a Roma.',     en: 'They go to Rome.',         pronoun: 'loro',    answer: 'vanno',  distractors: ['vado','andiamo','va'] },
    ]
  },
];

// ── FLASHCARD STATE ──
let fcFilter = 'all';
let fcDeck = [];
let fcIndex = 0;
let fcFlipped = false;

function buildFcControls() {
  const row = document.getElementById('fcControls');
  const types = ['all', 'irregular', '-ARE', '-ERE', '-IRE'];
  row.innerHTML = '';
  types.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'fc-filter-btn' + (fcFilter === t ? ' active' : '');
    btn.textContent = t === 'all' ? 'All Verbs' : t;
    btn.onclick = () => { fcFilter = t; buildFcControls(); buildDeck(); };
    row.appendChild(btn);
  });
}

function buildDeck() {
  const verbs = fcFilter === 'all' ? VERBS : VERBS.filter(v => v.type === fcFilter);
  fcDeck = [];
  verbs.forEach(v => {
    v.conjugations.forEach(c => {
      fcDeck.push({
        verbLabel: v.label,
        verbMeaning: v.meaning,
        verbTip: v.tip,
        verbType: v.type,
        pronoun: c.pronoun,
        form: c.form,
        phonetic: c.phonetic,
      });
    });
  });
  fcIndex = 0;
  fcFlipped = false;
  renderCard();
}

function fcShuffle() {
  for (let i = fcDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcDeck[i], fcDeck[j]] = [fcDeck[j], fcDeck[i]];
  }
  fcIndex = 0;
  fcFlipped = false;
  renderCard();
}

function renderCard() {
  const card = fcDeck[fcIndex];
  const front = document.getElementById('fcFront');
  const back  = document.getElementById('fcBack');
  const el    = document.getElementById('fcCard');

  // Reset flip instantly
  el.classList.remove('flipped');
  fcFlipped = false;

  const verbColor = card.verbType === 'irregular' ? 'var(--red)' : 'var(--gold)';
  front.innerHTML = `
    <div class="fc-label">Conjugate${card.verbType === 'irregular' ? ' — <span style="color:var(--red)">irregular</span>' : ''}</div>
    <div class="fc-pronoun">${card.pronoun}</div>
    <div class="fc-verb" style="color:${verbColor}">${card.verbLabel}</div>
    <div class="fc-meaning">${card.verbMeaning}</div>
    <div class="fc-tap-hint">tap to reveal →</div>
  `;

  back.innerHTML = `
    <div class="fc-label">Answer</div>
    <div class="fc-pronoun">${card.pronoun} ${card.verbLabel}</div>
    <div class="fc-answer">${card.form}</div>
    <div class="fc-phonetic">${card.phonetic}</div>
    <div class="fc-tip">💡 ${card.verbTip}</div>
  `;

  // Counter & progress
  document.getElementById('fcCounter').textContent = `${fcIndex + 1} / ${fcDeck.length}`;
  document.getElementById('fcProgressFill').style.width = ((fcIndex + 1) / fcDeck.length * 100) + '%';
  document.getElementById('fcPrev').disabled = fcIndex === 0;
  document.getElementById('fcNext').disabled = fcIndex === fcDeck.length - 1;
}

function flipCard() {
  const el = document.getElementById('fcCard');
  fcFlipped = !fcFlipped;
  el.classList.toggle('flipped', fcFlipped);
}

function fcMove(dir) {
  const next = fcIndex + dir;
  if (next < 0 || next >= fcDeck.length) return;
  fcIndex = next;
  fcFlipped = false;
  renderCard();
}

// ── QUIZ STATE ──
let activeVerb = null;
let activeFilter = 'all';
let quizQueue = [];
let quizIndex = 0;
let score = 0;
let total = 0;
let answered = false;
let streak = 0;

function buildVerbs() {
  const grid = document.getElementById('verbGrid');
  grid.innerHTML = '';
  VERBS.forEach(v => {
    const chip = document.createElement('button');
    chip.className = 'verb-chip' + (activeVerb === v.id ? ' active' : '');
    chip.innerHTML = `<strong>${v.label}</strong><span class="meaning">${v.meaning}</span>`;
    chip.onclick = () => toggleConj(v.id);
    grid.appendChild(chip);
  });
}

function toggleConj(id) {
  const panel = document.getElementById('conjPanel');
  if (activeVerb === id) {
    activeVerb = null;
    panel.classList.remove('visible');
    panel.innerHTML = '';
    buildVerbs();
    return;
  }
  activeVerb = id;
  buildVerbs();
  const v = VERBS.find(x => x.id === id);
  panel.innerHTML = `
    <div class="conj-header">
      <div class="conj-verb">${v.label}</div>
      <div class="conj-meaning">${v.meaning}</div>
      <div class="conj-tip">💡 ${v.tip}</div>
    </div>
    <div class="conj-grid">
      ${v.conjugations.map(c => `
        <div class="conj-row">
          <span class="pronoun">${c.pronoun}</span>
          <span class="form">${c.form}</span>
          <span class="phonetic">${c.phonetic}</span>
        </div>
      `).join('')}
    </div>
  `;
  panel.classList.add('visible');
}

function buildFilters() {
  const row = document.getElementById('filterRow');
  const types = ['all', 'irregular', '-ARE', '-ERE', '-IRE'];
  row.innerHTML = '';
  types.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilter === t ? ' active' : '');
    btn.textContent = t === 'all' ? 'All Verbs' : t;
    btn.onclick = () => { activeFilter = t; buildFilters(); buildQuiz(); };
    row.appendChild(btn);
  });
}

function getFilteredSentences() {
  const verbs = activeFilter === 'all' ? VERBS : VERBS.filter(v => v.type === activeFilter);
  let all = [];
  verbs.forEach(v => { v.sentences.forEach(s => all.push({ ...s, verbLabel: v.label, verbMeaning: v.meaning, verbTip: v.tip })); });
  // Shuffle
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all;
}

function buildQuiz() {
  quizQueue = getFilteredSentences();
  quizIndex = 0;
  score = 0;
  total = 0;
  streak = 0;
  answered = false;
  updateScore();
  updateProgress();
  renderQuestion();
}

function renderQuestion() {
  const area = document.getElementById('quizArea');
  if (quizIndex >= quizQueue.length) {
    area.innerHTML = `
      <div class="quiz-card" style="padding:3rem">
        <div style="font-family:'Playfair Display',serif;font-size:2.5rem;color:var(--gold);margin-bottom:1rem">🎉 Bravissimo!</div>
        <div style="color:var(--muted);font-size:1rem;margin-bottom:1.5rem">You scored <strong style="color:var(--text)">${score}/${total}</strong> — ${score===total?'perfetto!':score/total>=0.7?'molto bene!':'continua così!'}</div>
        <button class="next-btn visible" onclick="buildQuiz()">Ricomincia — Start Again</button>
      </div>`;
    return;
  }

  answered = false;
  const q = quizQueue[quizIndex];
  const opts = shuffle([q.answer, ...q.distractors.slice(0,3)]);

  area.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-verb-hint"><span class="verb-name">${q.verbLabel}</span> — ${q.verbMeaning} · pronoun: <strong>${q.pronoun}</strong></div>
      <div class="quiz-sentence">${q.it.replace('___', '<span class="quiz-blank">___</span>')}</div>
      <div class="quiz-tip">💬 ${q.en}</div>
      <div class="options-grid">
        ${opts.map(o => `<button class="option-btn" onclick="choose(this,'${o}','${q.answer}','${encodeURIComponent(q.verbTip)}')">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQ()">Prossima domanda →</button>
    </div>
    <div class="streak" id="streakEl"></div>
  `;
  updateStreak();
}

function choose(btn, chosen, correct, tipEnc) {
  if (answered) return;
  answered = true;
  total++;
  const tip = decodeURIComponent(tipEnc);
  const fb = document.getElementById('feedback');
  const nextBtn = document.getElementById('nextBtn');

  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });

  if (chosen === correct) {
    score++;
    streak++;
    btn.classList.add('correct');
    fb.className = 'feedback correct-fb';
    fb.innerHTML = `<strong>✓ Corretto!</strong> "${correct}" is the right form.<span class="rule">💡 ${tip}</span>`;
  } else {
    streak = 0;
    btn.classList.add('wrong');
    fb.className = 'feedback wrong-fb';
    fb.innerHTML = `<strong>✗ Not quite.</strong> The correct form is <strong>${correct}</strong>.<span class="rule">💡 ${tip}</span>`;
  }

  nextBtn.classList.add('visible');
  updateScore();
  updateStreak();
}

function nextQ() {
  quizIndex++;
  updateProgress();
  renderQuestion();
}

function updateScore() {
  document.getElementById('scoreBadge').textContent = `${score} / ${total}`;
}

function updateProgress() {
  const pct = quizQueue.length ? (quizIndex / quizQueue.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateStreak() {
  const el = document.getElementById('streakEl');
  if (!el) return;
  if (streak >= 2) {
    el.innerHTML = `<span class="streak-fire">🔥</span> ${streak}-answer streak!`;
  } else {
    el.innerHTML = '';
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Init
buildVerbs();
buildFcControls();
buildDeck();
buildFilters();
buildQuiz();
</script>
